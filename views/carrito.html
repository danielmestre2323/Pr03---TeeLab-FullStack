<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/base.css">
    <link rel="stylesheet" href="../public/css/header.css">
    <link rel="stylesheet" href="../public/css/carrito.css">
    <script src="../public/js/carrito.js" defer></script>
    <title>Cesta de la compra - TeeLab</title>
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <a href="productos.html">TeeLab</a>
        </div>
        <nav class="nav-links">
            <a href="carrito.html" class="cart-icon" aria-label="Ver carrito">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </a>
        </nav>
    </header>

    <main class="cesta-container">
        <div class="cesta-header">
            <div class="cesta-titulo">
                <h1>Cesta de la compra</h1>
                <button id="btn-vaciar" class="link-azul">Vaciar carrito</button>
            </div>
            <div class="cesta-precio-header">Precio</div>
        </div>

        <div id="contenedor-carrito"></div>

        <div id="resumen-pedido" class="cesta-footer" style="display: none;">
            <div class="subtotal-texto">
                Subtotal (<span id="total-items">0</span> productos):
                <strong><span id="precio-total">0.00</span>€</strong>
            </div>
            <button id="btn-pagar" class="btn-cistella btn-tramitar">TRAMITAR PEDIDO</button>
        </div>
    </main>
</body>
</html>
